        <!-- Email Form -->
            <div class="col-md-9">
                <div class="content">
                    <form action="https://formspree.io/kieran.wadforth@hotmail.com" method="POST">
                        <label for="forename">First Name</label>
                        <input type="text" id="forename" name="firstname" placeholder="Your name...">

                            <option value="suggestion">Suggestion</option>

                        </select>

                        <textarea id="body" name="body" placeholder="Your message..." style="height:200px"></textarea>
                        <input type="submit" value="Send">
                        
                    </form>
